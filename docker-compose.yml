services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # 127.0.0.1 only — no public DB exposure. On the dev laptop this still
    # reaches the local Spring app at jdbc:postgresql://localhost:5432/...
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:5
    container_name: ecommerce-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    # Loopback only — reach it from the VPS via SSH tunnel:
    #   ssh -L 8081:127.0.0.1:8081 root@<vps>
    ports:
      - "127.0.0.1:8081:8080"

  # Req 6 — distributed cache backend. allkeys-lru so that under memory pressure
  # the least-recently-used product entries are evicted first (right policy for a
  # hot-set read cache); maxmemory caps Redis so it can never starve the host.
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application instances (prod profile only) ──────────────────────────────
  # Start with: docker compose --profile prod up -d --build
  # Local dev keeps running the Spring app natively (./mvnw spring-boot:run).

  app1:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    image: ecommerce-app:latest   # built once here; app2 reuses this tag
    container_name: ecommerce-app1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ecommerce}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
      SPRING_DATA_REDIS_HOST: redis
      INSTANCE_ID: app1
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "127.0.0.1:8006:8080"   # direct access for debugging

  app2:
    profiles: ["prod"]
    image: ecommerce-app:latest   # built by app1; never pulled from a registry
    pull_policy: never
    container_name: ecommerce-app2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ecommerce}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
      SPRING_DATA_REDIS_HOST: redis
      INSTANCE_ID: app2
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "127.0.0.1:8007:8080"   # direct access for debugging

  nginx:
    profiles: ["prod"]
    image: nginx:1.27-alpine
    container_name: ecommerce-nginx
    restart: unless-stopped
    depends_on:
      - app1
      - app2
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "0.0.0.0:8005:80"       # main entry point through load balancer

volumes:
  postgres_data:
