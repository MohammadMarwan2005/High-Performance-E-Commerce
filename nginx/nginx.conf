events {
    worker_connections 1024;
}

http {
    # Round-robin is Nginx's default: requests cycle app1 → app2 → app1 → ...
    # Alternative: least_conn (routes each new request to the instance with
    # the fewest active connections — better for requests with variable
    # processing time). Round-robin is chosen here because all requests hit
    # the same stateless app, making the load naturally even.
    upstream ecommerce {
        server app1:8080;
        server app2:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass          http://ecommerce;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            # Pass the proto from the upstream reverse proxy (system Nginx),
            # not $scheme (which is always "http" on the internal hop).
            proxy_set_header    X-Forwarded-Proto $http_x_forwarded_proto;

            # Disable proxy buffering so streaming/SSE responses work correctly.
            proxy_buffering     off;
        }
    }
}
