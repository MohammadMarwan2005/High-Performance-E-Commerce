spring:
  application:
    name: E-Commerce

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ecommerce-hikari
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 30000
      max-lifetime: 600000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Req 10 benchmark — expose query/statement counters via /admin/db-stats
        generate_statistics: true
    open-in-view: false

  # Req 6 — distributed cache backend. Lettuce connects lazily, so the app still
  # starts if Redis is briefly unavailable; cache misses simply fall through to
  # the database. Override host per-instance via SPRING_DATA_REDIS_HOST.
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false   # jobs run on schedule only, never auto-run at startup

server:
  port: 8080
  forward-headers-strategy: framework
  tomcat:
    threads:
      max: 50
      min-spare: 10
    accept-count: 100
    max-connections: 200
    connection-timeout: 5s

app:
  instance-id: ${INSTANCE_ID:local}
  # Req 7 — checkout concurrency-control strategy: "optimistic" (@Version + retry)
  # or "pessimistic" (SELECT ... FOR UPDATE). Override per-instance via
  # APP_CHECKOUT_STRATEGY without a rebuild.
  checkout:
    strategy: ${APP_CHECKOUT_STRATEGY:optimistic}
  rabbitmq:
    exchange: orders
    invoice-queue: orders.invoice
    notification-queue: orders.notification
    routing-key: order.placed

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs
