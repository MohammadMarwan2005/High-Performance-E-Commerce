spring:
  application:
    name: E-Commerce

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ecommerce-hikari
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 30000
      max-lifetime: 600000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false   # jobs run on schedule only, never auto-run at startup

server:
  port: 8080
  tomcat:
    threads:
      max: 50
      min-spare: 10
    accept-count: 100
    max-connections: 200
    connection-timeout: 5s

app:
  rabbitmq:
    exchange: orders
    invoice-queue: orders.invoice
    notification-queue: orders.notification
    routing-key: order.placed

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs
